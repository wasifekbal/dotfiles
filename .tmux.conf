#############################
# tmux plugin manager (tpm) #
#####################################################################
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm #
#####################################################################

#######################################
# prefix + I => To install all pugins #
#######################################

set-environment -gF TMUX_PLUGIN_MANAGER_PATH '#{HOME}/.config/tmux/plugins/'

if 'test ! -d "${TMUX_PLUGIN_MANAGER_PATH}/tpm"' {
  run 'mkdir -p "${TMUX_PLUGIN_MANAGER_PATH}"'
  run 'git clone https://github.com/tmux-plugins/tpm "${TMUX_PLUGIN_MANAGER_PATH}/tpm"'
  run '${TMUX_PLUGIN_MANAGER_PATH}/tpm/bin/install_plugins'
}

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha" # latte, frappe, macchiato, or mocha
set -g @catppuccin_window_status_style "rounded" # basic, rounded, slanted, custom, or none
set -g @catppuccin_window_text " #W#F"
set -g @catppuccin_window_current_text " #W#F"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'

set -g @plugin 'tassaron/tmux-df'
set -g @df_cmd_private1 "/dev/nvme0n1p9"
set -g @df_cmd_private2 "/dev/nvme0n1p4"

set -g @plugin 'tmux-plugins/tmux-cpu'

# Load catppuccin
run ~/.config/tmux/plugins/tmux/catppuccin.tmux
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -gF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#[fg=#{@thm_surface_0},bg=default]#[fg=#{@_ctp_status_bg},bg=#{@thm_surface_0},reverse]#[none]#[fg=#{@thm_fg},bg=#{@thm_surface_0}]󰍛 MEM:#{ram_percentage} #[fg=#{@_ctp_status_bg},bg=#{@thm_surface_0},reverse]#[none]"  
set -agF status-right "#[fg=#{@thm_surface_0},bg=default]#[fg=#{@_ctp_status_bg},bg=#{@thm_surface_0},reverse]#[none]#[fg=#{@thm_fg},bg=#{@thm_surface_0}]%d/%m/%y|%a|%l:%M%p #[fg=#{@_ctp_status_bg},bg=#{@thm_surface_0},reverse]#[none]"




set-option -ga terminal-overrides ",xterm-256color:Tc"

### Enable mouse scrolling
set -g mouse on

# enable vi keys.
setw -g mode-keys vi

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# create session
bind C-c new-session

### Opening every window and pane in same directory
bind c new-window -c "#{pane_current_path}"

# split panes using \ and -
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# -- general -------------------------------------------------------------------

### Scroll-back limit
set-option -g history-limit 10000
setw -g xterm-keys on
set -s escape-time 0                      # faster command sequences
set -sg repeat-time 500                   # increase repeat timeout
set -s focus-events on

# -- display -------------------------------------------------------------------

set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows

setw -g automatic-rename on   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed

set -g set-titles on          # set terminal title

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time

set -g status-interval 2     # redraw status line every 10 seconds

set-option -g status-position bottom

# clear both screen and history
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# activity
set -g monitor-activity on
set -g visual-activity off
# reload configuration
bind r source-file ~/.tmux.conf \; display '~/.tmux.conf sourced'

# switch panes using Alt-arrow without prefix
bind h select-pane -L  # move left
bind j select-pane -D  # move down
bind k select-pane -U  # move up
bind l select-pane -R  # move right
bind > swap-pane -D       # swap current pane with the next one
bind < swap-pane -U       # swap current pane with the previous one

# Resize panes
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r H resize-pane -L 5
bind-key -r L resize-pane -R 5

# sync all panes
# bind -n C-s set synchronize-panes

# window navigation
unbind n
unbind p
# bind p previous-window # select previous window
bind -n M-[ previous-window
# bind n next-window     # select next window
bind -n M-] next-window
bind Tab last-window        # move to last active window

bind-key f run-shell "tmux neww tmux-session-maker"

# toggle status bar
bind-key F11 set -g status 

# copy to X11 clipboard
if -b 'command -v xsel > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | xsel -i -b"'
if -b '! command -v xsel > /dev/null 2>&1 && command -v xclip > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | xclip -i -selection clipboard >/dev/null 2>&1"'

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

