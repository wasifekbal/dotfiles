include=~/.config/fuzzel/themes/catppuccin-mocha/sapphire.ini

[main]
font = FiraCode Nerd Font Propo:size=12
icons-enabled = true
prompt = " "
dpi-aware = yes
use-bold = false
inner-pad = 10
vertical-pad = 10
horizontal-pad = 20
letter-spacing=0
icon-theme = Papirus-Dark

[border]
width = 1
radius = 5

[key-bindings]
delete-line-forward = none
next = Down Control+j
prev = Up Control+k
next-page = Shift+j
prev-page = Shift+k
